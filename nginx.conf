# Preserve HTTPS from host nginx (SSL terminates there; this container listens on HTTP).
# Without this, $scheme is always "http" and Django CSRF / invite links break.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

upstream app {
    server web:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Serve Django static files directly (collected by whitenoise too, but nginx is faster)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # All other requests → Gunicorn
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_redirect off;
    }
}
