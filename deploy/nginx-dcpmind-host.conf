# Host nginx for dcpmind.com (multi-app VPS)
#
# IMPORTANT: This block must ONLY match dcpmind.com / www.dcpmind.com.
# Do NOT set default_server here — or every other domain on this VPS
# will proxy to port 8088 and Django will return HTTP 400 (DisallowedHost).
#
# Install:
#   sudo cp deploy/nginx-dcpmind-host.conf /etc/nginx/sites-available/dcpmind.com
#   sudo ln -sf /etc/nginx/sites-available/dcpmind.com /etc/nginx/sites-enabled/dcpmind.com
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d dcpmind.com -d www.dcpmind.com
#
# If other apps broke after certbot, see deploy/MULTI_APP_NGINX.md

server {
    listen 80;
    server_name dcpmind.com www.dcpmind.com;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
