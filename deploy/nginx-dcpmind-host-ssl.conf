# Host nginx for dcpmind.com — SSL version (multi-app VPS)
#
# PROBLEM: If this file is named dcpmind.com in sites-enabled, nginx loads it
# FIRST (alphabetically) and it becomes the DEFAULT SSL server on port 443.
# Some traffic then proxies to 127.0.0.1:8088 → Django HTTP 400 for other hosts.
#
# FIX: Enable with a name that sorts LAST, e.g.:
#   sudo ln -sf /etc/nginx/sites-available/dcpmind.com /etc/nginx/sites-enabled/zzz-dcpmind.com
#
# Do NOT use default_server on listen lines below.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dcpmind.com www.dcpmind.com;

    ssl_certificate /etc/letsencrypt/live/dcpmind.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dcpmind.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name dcpmind.com www.dcpmind.com;

    location / {
        return 301 https://$host$request_uri;
    }
}
