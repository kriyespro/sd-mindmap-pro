# Production-style stack: Nginx (80) → Gunicorn (8000, internal) → PostgreSQL
# Usage: copy .env.example → .env, set SECRET_KEY and domains, then:
#   docker compose build && docker compose up -d

services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ntarque}:${POSTGRES_PASSWORD:-ntarque}@db:5432/${POSTGRES_DB:-ntarque}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ntarque}
      POSTGRES_USER: ${POSTGRES_USER:-ntarque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ntarque}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ntarque} -d ${POSTGRES_DB:-ntarque}']
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - staticfiles:/app/staticfiles:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  staticfiles:
