# Production-style stack: Nginx (80) → Gunicorn (8000, internal) → PostgreSQL
# Usage: copy .env.example → .env, set SECRET_KEY and domains, then:
#   docker compose build && docker compose up -d

services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # POSTGRES_* (user, password, db name) come from env_file only — avoids compose mangling special chars in passwords.
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      # First boot: migrate + collectstatic + Gunicorn can be slow on 1 GB RAM droplets
      start_period: 300s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ → $ in container; uses same POSTGRES_* as the running Postgres instance
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - staticfiles:/app/staticfiles:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  staticfiles:
